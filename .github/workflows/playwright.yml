name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      project:
        description: 'Który projekt testować?'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - minibudzet-chromium
          - pms-chromium
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
      env:
        MINIBUDZET_TEST_USER_MAIL: ${{ secrets.MINIBUDZET_TEST_USER_MAIL }}
        MINIBUDZET_TEST_USER_PASSWORD: ${{ secrets.MINIBUDZET_TEST_USER_PASSWORD }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
